<!DOCTYPE html>
<html>
<head>
    <title>Raven FP Calculator</title>
    <script>
        function formatDecimal(input) {
            let value = parseFloat(input.value);
            if (!isNaN(value)) {
                input.value = value.toFixed(2);
            }
        }

        function validateInputs() {
            const walletInput = document.getElementById('wallet');
            const earningsInput = document.getElementById('earnings');
            const errorMessage = document.getElementById('error-message');
            errorMessage.innerHTML = '';
            let missingFields = [];

            if (walletInput.value.trim() === '') {
                missingFields.push('Wallet');
            }
            if (earningsInput.value.trim() === '') {
                missingFields.push('Earnings');
            }

            if (missingFields.length > 0) {
                errorMessage.innerHTML = 'Missing fields: ' + missingFields.join(', ');
                errorMessage.style.color = 'red';
                return false;
            }
            return true;
        }

        function calculate() {
            if (validateInputs()) {
                // Perform calculation logic here
            }
        }

        function deleteHistoryEntry(entryId) {
            const entry = document.getElementById(entryId);
            if (entry) {
                entry.remove();
            }
        }
    </script>
</head>
<body>
    <h1>Raven FP Calculator</h1>
    <label for="wallet">Wallet</label>
    <input id="wallet" type="text" onblur="formatDecimal(this)">
    <label for="earnings">Earnings</label>
    <input id="earnings" type="text" onblur="formatDecimal(this)">
    <button onclick="calculate()">Calculate</button>
    <div id="error-message"></div>

    <h2>History</h2>
    <div id="history">
        <div id="entry1">History item 1 <button onclick="deleteHistoryEntry('entry1')">X</button></div>
        <div id="entry2">History item 2 <button onclick="deleteHistoryEntry('entry2')">X</button></div>
    </div>
</body>
</html>
